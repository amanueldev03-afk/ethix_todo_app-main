<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Todo App - Ethix</title>
  </head>
  <body class="bg-gray-50">
    <div class="container mx-auto px-4 py-8">
      <h1 class="text-5xl font-bold text-center text-sky-500 underline mt-12 mb-8">
        My Todo App
      </h1>
      
      <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-6 mb-8">
        <div class="flex gap-4">
          <input
            id="newTodoInput"
            class="flex-1 text-lg text-gray-700 bg-gray-100 rounded-lg px-4 py-2 border-2 border-sky-400 focus:outline-none focus:border-sky-600"
            type="text"
            placeholder="Add a new todo..."
          />
          <button class="bg-orange-500 hover:bg-orange-600 px-6 py-2 rounded-xl font-bold text-lg text-white transition">
            Add
          </button>
        </div>
      </div>
      
      <div class="max-w-2xl mx-auto">
        <h2 class="text-2xl font-bold text-gray-700 mb-4">Your Todos:</h2>
        {% if todo_lists %}
          {% for t in todo_lists %}
          <a
            href="/todos/{{t.id}}"
            class="flex items-center gap-3 mt-3 bg-white hover:bg-sky-50 p-4 rounded-lg shadow transition group"
          >
            <input class="h-5 w-5 cursor-pointer" type="checkbox" onclick="event.preventDefault()" />
            <div class="flex-1">
              <p class="text-xl font-medium text-gray-700 group-hover:text-sky-600">{{t.title}}</p>
              <p class="text-sm text-gray-500">by {{t.user}}</p>
            </div>
            <span class="text-gray-400 group-hover:text-sky-500">→</span>
          </a>
          {% endfor %}
        {% else %}
          <div class="text-center py-12 bg-white rounded-lg shadow">
            <p class="text-xl text-gray-500">No todos yet! Create your first todo above.</p>
          </div>
        {% endif %}
      </div>
    </div>
  </body>
</html>
