<!-- templates/delete_todo.html -->
<!doctype html>
<html>
  <head>
    <title>Delete Todo</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div class="w-1/2 mx-auto mt-20 text-center">
      <div class="bg-red-100 border border-red-400 p-8 rounded-lg">
        <svg class="w-16 h-16 text-red-600 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
        <h1 class="text-3xl font-bold text-red-600 mb-4">Delete Todo</h1>
        <p class="text-lg mb-4">Are you sure you want to delete <strong>"{{ todo.title }}"</strong>?</p>
        <p class="text-gray-600 mb-6">This action cannot be undone.</p>
        
        <form method="POST" action="/todos/{{ todo.id }}/delete/">
          {% csrf_token %}
          <button type="submit" 
                  class="bg-red-500 text-white px-6 py-2 rounded hover:bg-red-600 transition mr-2">
            Yes, Delete
          </button>
          <a href="/todos/" 
             class="bg-gray-500 text-white px-6 py-2 rounded hover:bg-gray-600 transition">
            Cancel
          </a>
        </form>
      </div>
    </div>
  </body>
</html>
