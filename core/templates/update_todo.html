<!doctype html>
<html>
  <head>
    <title>Update Todo</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div class="w-1/2 mx-auto mt-10">
      <h1 class="text-3xl font-bold text-center mb-8">Update Todo</h1>
      
      <form method="POST" class="bg-gray-100 p-6 rounded-lg">
        {% csrf_token %}
        
        <div class="mb-4">
          <label class="block text-gray-700 font-bold mb-2">Title:</label>
          <input type="text" name="title" value="{{todo.title}}" required class="w-full px-3 py-2 border rounded">
        </div>
        
        <div class="mb-4">
          <label class="block text-gray-700 font-bold mb-2">Description:</label>
          <textarea name="description" rows="4" class="w-full px-3 py-2 border rounded">{{todo.description}}</textarea>
        </div>
        
        <div class="mb-4">
          <label class="block text-gray-700 font-bold mb-2">Priority:</label>
          <select name="priority" class="w-full px-3 py-2 border rounded">
            <option value="H" {% if todo.priority == 'H' %}selected{% endif %}>High</option>
            <option value="M" {% if todo.priority == 'M' %}selected{% endif %}>Medium</option>
            <option value="L" {% if todo.priority == 'L' %}selected{% endif %}>Low</option>
          </select>
        </div>
        
        <div class="mb-4">
          <label class="inline-flex items-center">
            <input type="checkbox" name="is_completed" {% if todo.is_completed %}checked{% endif %} class="mr-2">
            <span class="text-gray-700 font-bold">Completed</span>
          </label>
        </div>
        
        <div class="flex gap-4">
          <button type="submit" class="bg-yellow-500 text-white px-6 py-2 rounded hover:bg-yellow-600">Update</button>
          <a href="/todos/" class="bg-gray-500 text-white px-6 py-2 rounded hover:bg-gray-600">Cancel</a>
        </div>
      </form>
    </div>
  </body>
</html>
