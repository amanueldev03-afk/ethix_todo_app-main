<!-- templates/index.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Todo App</title>
  </head>
  <body class="bg-gray-50">
    <h1 class="text-5xl font-bold text-center text-sky-500 underline mt-12">
      My Todo App
    </h1>
    
    <!-- Add Todo Button -->
    <div class="w-1/3 mx-auto flex justify-center mt-10">
      <a href="/todos/create/" 
         class="bg-green-500 text-white px-6 py-3 rounded-xl font-bold text-lg hover:bg-green-600 transition shadow-lg">
        + Add New Todo
      </a>
    </div>

    <!-- Todo List -->
    <div class="w-1/3 mx-auto mt-10 mb-10">
      {% for t in todo_lists %}
      <div class="flex gap-2 items-center mt-4 bg-white py-3 px-4 rounded-lg shadow hover:shadow-lg transition {% if t.is_completed %}bg-green-50{% endif %}">
        <!-- Toggle Complete Link -->
        <a href="/todos/{{t.id}}/toggle/" class="flex items-center">
          <input type="checkbox" 
                 class="h-5 w-5 cursor-pointer" 
                 {% if t.is_completed %}checked{% endif %}
                 onclick="window.location.href='/todos/{{t.id}}/toggle/'; return false;">
        </a>
        
        <!-- Todo Details Link -->
        <a href="/todos/{{t.id}}/" class="flex-1">
          <p class="text-xl font-medium {% if t.is_completed %}line-through text-gray-500{% else %}text-gray-800{% endif %}">
            {{t.title}}
          </p>
          <p class="text-xs text-gray-500">User: {{t.user}} | Priority: 
            <span class="{% if t.priority == 'High' %}text-red-500 font-bold{% elif t.priority == 'Medium' %}text-yellow-500{% else %}text-green-500{% endif %}">
              {{t.priority}}
            </span>
          </p>
        </a>
        
        <!-- Action Buttons -->
        <div class="flex gap-2">
          <a href="/todos/{{t.id}}/update/" 
             class="bg-yellow-500 text-white px-3 py-1 rounded text-sm hover:bg-yellow-600 transition">
            Edit
          </a>
          <a href="/todos/{{t.id}}/delete/" 
             class="bg-red-500 text-white px-3 py-1 rounded text-sm hover:bg-red-600 transition">
            Delete
          </a>
        </div>
      </div>
      {% empty %}
      <div class="text-center mt-10 p-8 bg-gray-100 rounded-lg">
        <p class="text-gray-500 text-lg">No todos yet!</p>
        <a href="/todos/create/" class="text-blue-500 hover:underline">Create your first todo →</a>
      </div>
      {% endfor %}
    </div>
  </body>
</html>
