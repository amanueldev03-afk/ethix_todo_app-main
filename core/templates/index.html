<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Todo App</title>
  </head>
  <body>
    <h1 class="text-5xl font-bold text-center text-sky-500 underline mt-12">
      My Todo App
    </h1>
    
    <!-- Add Todo Button -->
    <div class="w-1/3 mx-auto flex justify-center mt-10">
      <a href="/todos/create/" class="bg-green-500 text-white px-6 py-2 rounded-xl font-bold text-lg hover:bg-green-600">
        + Add New Todo
      </a>
    </div>

    <!-- Todo List -->
    <div class="w-1/3 mx-auto mt-10">
      {% for t in todo_lists %}
      <div class="flex gap-2 items-center mt-4 bg-gray-100 py-3 px-4 rounded-lg {% if t.is_completed %}bg-green-50{% endif %}">
        <a href="/todos/{{t.id}}/toggle/" class="flex items-center">
          <input class="h-5 w-5" type="checkbox" {% if t.is_completed %}checked{% endif %}>
        </a>
        <a href="/todos/{{t.id}}" class="flex-1">
          <p class="text-2xl font-medium {% if t.is_completed %}line-through text-gray-500{% endif %}">
            {{t.title}} - {{t.user}}
          </p>
          <p class="text-sm text-gray-600">Priority: {{t.priority}}</p>
        </a>
        <div class="flex gap-2">
          <a href="/todos/{{t.id}}/update/" class="bg-yellow-500 text-white px-3 py-1 rounded text-sm">Edit</a>
          <a href="/todos/{{t.id}}/delete/" class="bg-red-500 text-white px-3 py-1 rounded text-sm">Delete</a>
        </div>
      </div>
      {% empty %}
      <p class="text-center text-gray-500 mt-10">No todos yet. Create one!</p>
      {% endfor %}
    </div>
  </body>
</html>
