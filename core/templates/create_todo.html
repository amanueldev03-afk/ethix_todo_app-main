<!-- templates/create_todo.html -->
<!doctype html>
<html>
  <head>
    <title>Create Todo</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div class="w-1/2 mx-auto mt-10">
      <h1 class="text-3xl font-bold text-center mb-8">Create New Todo</h1>
      
      {% if error %}
      <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
        {{ error }}
      </div>
      {% endif %}
      
      <form method="POST" action="/todos/create/" class="bg-gray-100 p-6 rounded-lg">
        {% csrf_token %}
        
        <div class="mb-4">
          <label class="block text-gray-700 font-bold mb-2">Title:*</label>
          <input type="text" name="title" required 
                 class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <div class="mb-4">
          <label class="block text-gray-700 font-bold mb-2">Description:</label>
          <textarea name="description" rows="4" 
                    class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>
        
        <div class="mb-4">
          <label class="block text-gray-700 font-bold mb-2">Select User:*</label>
          <select name="user_id" required 
                  class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">-- Select a user --</option>
            {% for user in users %}
            <option value="{{ user.username }}">{{ user.username }} ({{ user.email }})</option>
            {% endfor %}
          </select>
        </div>
        
        <div class="flex gap-4">
          <button type="submit" 
                  class="bg-green-500 text-white px-6 py-2 rounded hover:bg-green-600 transition">
            Create Todo
          </button>
          <a href="/todos/" 
             class="bg-gray-500 text-white px-6 py-2 rounded hover:bg-gray-600 transition">
            Cancel
          </a>
        </div>
      </form>
    </div>
  </body>
</html>
