<!doctype html>
<html>
  <head>
    <title>Create Todo</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div class="w-1/2 mx-auto mt-10">
      <h1 class="text-3xl font-bold text-center mb-8">Create New Todo</h1>
      
      <form method="POST" class="bg-gray-100 p-6 rounded-lg">
        {% csrf_token %}
        
        <div class="mb-4">
          <label class="block text-gray-700 font-bold mb-2">Title:</label>
          <input type="text" name="title" required class="w-full px-3 py-2 border rounded">
        </div>
        
        <div class="mb-4">
          <label class="block text-gray-700 font-bold mb-2">Description:</label>
          <textarea name="description" rows="4" class="w-full px-3 py-2 border rounded"></textarea>
        </div>
        
        <div class="mb-4">
          <label class="block text-gray-700 font-bold mb-2">User:</label>
          <select name="user_id" required class="w-full px-3 py-2 border rounded">
            <option value="">Select User</option>
            {% for user in users %}
            <option value="{{user.username}}">{{user.username}} ({{user.email}})</option>
            {% endfor %}
          </select>
        </div>
        
        <div class="flex gap-4">
          <button type="submit" class="bg-green-500 text-white px-6 py-2 rounded hover:bg-green-600">Create</button>
          <a href="/todos/" class="bg-gray-500 text-white px-6 py-2 rounded hover:bg-gray-600">Cancel</a>
        </div>
      </form>
    </div>
  </body>
</html>
